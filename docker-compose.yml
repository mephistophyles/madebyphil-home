services:
  app:
    container_name: madebyphil-home
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose: 
      - "80"
    networks:
      - webnet

  nginx:
    container_name: nginx-container
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - /home/ubuntu/sites/rowan-site:/usr/share/nginx/rowan-site:ro
    networks:
      - webnet

networks:
  webnet:
    driver: bridge