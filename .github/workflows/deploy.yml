name: Build and Deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: mephistophyles/madebyphil-home

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push site
        uses: docker/build-push-action@v5
        with:
          context: ./madebyphil-home
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Clone your repository at /home/ubuntu/
            # Navigate to project folder
            cd /home/ubuntu/<RepoName>
            
            # Get latest docker-compose config
            git pull origin main
            
            # Pull the fresh images we just built
            docker compose pull
            
            # Restart containers with new code
            docker compose up -d
            
            # Clean up old images to save space
            docker image prune -f