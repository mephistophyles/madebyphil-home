name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Check TCP 22 reachability
        run: |
          nc -vz "${{ secrets.SSH_HOST }}" 22

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -T 10 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy script
        run: |
          ssh \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -i ~/.ssh/id_deploy \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'bash -x /home/ubuntu/madebyphil-home/scripts/deploy.sh'